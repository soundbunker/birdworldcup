<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>새소리 이상형월드컵 | 오크밸리</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121826;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --danger: #f87171;
      --ring: rgba(96,165,250,.45);
      --radius: 16px;

      /* 라운드별 배경색 */
      --round1-bg: rgba(59, 130, 246, 0.15);
      --round2-bg: rgba(239, 68, 68, 0.15);
      --round3-bg: rgba(34, 197, 94, 0.15);
      --round4-bg: rgba(168, 85, 247, 0.15);
      --final-bg: rgba(251, 191, 36, 0.15);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    html, body { height: 100%; }
    button:focus, .card:focus, a:focus { outline: none; }
    button::-moz-focus-inner { border: 0; }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 800px at 20% -20%, #1f2937 0%, transparent 60%),
                  radial-gradient(1000px 700px at 120% 0%, #0f172a 0%, transparent 65%),
                  var(--bg);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
    }
    .app { width: 100%; max-width: 1100px; min-height: 100%; }
    header { display:flex; align-items:center; justify-content:space-between; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(16px, 4vw, 28px); font-weight: 800; letter-spacing: 0.2px; line-height: 1.2; }
    button, .btn {
      background: linear-gradient(180deg, #1f2937, #0b1220);
      color: var(--text); border: 1px solid #1f2a44; padding: 12px 16px; border-radius: 12px;
      cursor: pointer; font-weight: 600; transition: .2s ease; font-size: 14px;
      min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    button:hover { border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
    .btn-secondary { background: #111827; }

    .stage { background: rgba(17,24,39,.6); border: 1px solid #1f2a44; border-radius: var(--radius); padding: 16px; transition: background 0.5s ease; }
    .stage.round-1 { background: var(--round1-bg); border-color: rgba(59, 130, 246, 0.3); }
    .stage.round-2 { background: var(--round2-bg); border-color: rgba(239, 68, 68, 0.3); }
    .stage.round-3 { background: var(--round3-bg); border-color: rgba(34, 197, 94, 0.3); }
    .stage.round-4 { background: var(--round4-bg); border-color: rgba(168, 85, 247, 0.3); }
    .stage.final { background: var(--final-bg); border-color: rgba(251, 191, 36, 0.3); }
    .status { display:flex; align-items:center; justify-content:space-between; gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
    .status b { color: var(--text); }
    .round-title { font-size: clamp(20px, 5vw, 36px); font-weight: 900; text-align: center; margin-bottom: 16px; color: var(--text); text-shadow: 0 2px 4px rgba(0,0,0,0.5); line-height: 1.2; }

    .versus { display:grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: stretch; }
    .card {
      background: var(--card); border: 2px solid #1f2a44; border-radius: var(--radius);
      padding: 12px; display:flex; flex-direction:column; gap: 8px;
      position: relative; min-height: 320px; cursor: pointer;
      transition: transform 0.2s ease, border-color 0.3s ease, opacity 0.4s ease, filter 0.4s ease;
    }
    .card:active { transform: scale(0.97); }
    .card.winner { border-color: var(--accent-2); box-shadow: 0 0 16px rgba(52, 211, 153, 0.4); }
    .card.loser { opacity: 0.4; filter: grayscale(0.6); transform: scale(0.96); pointer-events: none; }
    .card.disabled { pointer-events: none; }

    .bird-image { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #1f2937; border: 1px solid #374151; position: relative; }
    .image-placeholder { width: 100%; height: 180px; background: linear-gradient(135deg, #1f2937, #374151); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 20px; border: 1px solid #374151; }
    .label { font-weight: 800; font-size: clamp(14px, 3vw, 18px); line-height: 1.2; text-align: center; }
    .sub { color: var(--muted); font-size: 11px; text-align: center; }

    .audio { display:flex; align-items:center; gap: 8px; }
    .audio button { padding: 10px 12px; min-height: 44px; flex-shrink: 0; min-width: 60px; }
    .audio button.playing { background: linear-gradient(180deg, var(--accent), #1e40af); border-color: var(--accent); color: white; }
    .progress { height: 6px; background:#111827; border-radius: 999px; overflow: hidden; border: 1px solid #1f2a44; flex: 1; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #22d3ee); transition: width 0.15s linear; }

    .vs { display:flex; align-items:center; justify-content:center; font-weight:900; font-size: clamp(20px, 5vw, 28px); color:#cbd5e1; }

    .select-hint { text-align: center; font-size: 13px; color: var(--muted); margin-top: 4px; }

    .footer { margin-top: 12px; color: var(--muted); font-size: 11px; display:flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .footer code { background:#0b1220; padding:2px 6px; border-radius:6px; border:1px solid #1f2a44; }
    .copyright { margin-top: 20px; text-align: center; color: var(--muted); font-size: 11px; border-top: 1px solid #1f2a44; padding-top: 12px; }
    .copyright a { color: var(--accent); text-decoration: none; }
    .copyright a:hover { text-decoration: underline; }

    .bottom-controls { display: flex; gap: 12px; justify-content: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #1f2a44; }

    .bird-status {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      justify-content: center;
      margin: 16px 0;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .bird-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #374151;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      opacity: 1;
      transform: scale(1);
    }
    .bird-icon img { width: 100%; height: 100%; object-fit: cover; }
    .bird-icon.active { border-color: var(--accent); box-shadow: 0 0 8px rgba(96, 165, 250, 0.5); }
    .bird-icon.eliminated {
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
    }
    .bird-icon.winner { border-color: var(--accent-2); box-shadow: 0 0 12px rgba(52, 211, 153, 0.7); }

    .hidden { display: none; }

    /* 매치 전환 애니메이션 */
    .versus.fade-out { opacity: 0; transform: translateY(8px); }
    .versus { transition: opacity 0.25s ease, transform 0.25s ease; }

    /* 올림픽 단상 스타일 */
    .podium { display: none; flex-direction: column; align-items: center; gap: 20px; padding: 30px; position: relative; overflow: hidden; }
    .podium.show { display: flex; }
    .podium-title { font-size: clamp(28px, 5vw, 42px); font-weight: 900; color: var(--text); text-shadow: 0 2px 8px rgba(0,0,0,0.7); margin-bottom: 20px; }
    .podium-container { display: flex; align-items: end; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .podium-place { display: flex; flex-direction: column; align-items: center; position: relative; opacity: 0; transform: translateY(50px); transition: all 0.8s ease; }
    .podium-place.show { opacity: 1; transform: translateY(0); }
    .podium-image { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid; margin-bottom: 10px; position: relative; }
    .podium-base { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; padding: 15px 20px; position: relative; }
    .podium-rank { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
    .podium-name { font-size: 16px; font-weight: 600; text-align: center; }

    .first-place .podium-image { border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
    .first-place .podium-base { background: linear-gradient(145deg, #ffd700, #ffed4a); color: #1a1a1a; height: 100px; }
    .first-place .podium-rank::before { content: '🥇 '; }

    .second-place .podium-image { border-color: #c0c0c0; box-shadow: 0 0 15px rgba(192, 192, 192, 0.5); }
    .second-place .podium-base { background: linear-gradient(145deg, #c0c0c0, #e5e5e5); color: #1a1a1a; height: 80px; }
    .second-place .podium-rank::before { content: '🥈 '; }

    .podium-restart {
      margin-top: 20px;
      padding: 14px 32px;
      font-size: 16px;
      background: linear-gradient(180deg, var(--accent), #1e40af);
      border: 1px solid var(--accent);
      color: white;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      transform: translateY(20px);
    }
    .podium-restart.show { opacity: 1; transform: translateY(0); transition: all 0.5s ease 0.5s; }
    .podium-restart:hover { background: linear-gradient(180deg, #3b82f6, var(--accent)); }

    /* 폭죽 효과 */
    .fireworks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; }

    @keyframes explode {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(15) rotate(180deg); opacity: 0; }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
    }

    .firework { animation: explode 1.5s ease-out forwards; }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ffd700;
      border-radius: 50%;
      animation: sparkle 0.8s ease-in-out infinite;
    }

    /* 모바일 최적화 */
    @media (max-width: 768px) {
      body { padding: 8px; }
      .app { padding: 0; }
      header { flex-direction: column; align-items: stretch; gap: 12px; }
      .versus { grid-template-columns: 1fr 1fr; gap: 12px; }
      .vs { display: none; }
      .card { min-height: 200px; padding: 10px; }
      .bird-image, .image-placeholder { height: 140px; }
      .stage { padding: 12px; }
      .round-title { margin-bottom: 12px; }
      .podium-container { flex-direction: column; align-items: center; gap: 20px; }
      .podium-place { margin-bottom: 0; }
      .podium-image { width: 100px; height: 100px; }
      .copyright { font-size: 10px; padding-top: 8px; }
      .desktop-only { display: none; }
    }

    @media (max-width: 480px) {
      .card { min-height: 180px; }
      .bird-image, .image-placeholder { height: 110px; font-size: 18px; }
      .label { font-size: 13px; }
      .sub { font-size: 10px; }
      .vs { font-size: 20px; }
      .podium-title { font-size: 20px; }
    }

    /* 풀스크린 이미지 모달 */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      animation: fadeIn 0.3s ease;
    }

    .image-modal.show {
      display: flex;
    }

    .image-modal img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🌿 새소리 이상형월드컵 | 오크밸리</h1>
      <div class="bird-status" id="birdStatus"></div>
    </header>

    <div class="stage">
      <div class="round-title" id="roundTitle">-</div>
      <div class="status">
        <div>매치 <b id="matchIndex">0</b>/<b id="matchTotal">0</b></div>
        <div>남은 참가자: <b id="remaining">0</b></div>
      </div>

      <div class="versus" id="versus">
        <div class="card" id="leftCard">
          <div id="leftImageContainer" class="image-placeholder">🐦</div>
          <div class="label" id="leftLabel">-</div>
          <div class="sub" id="leftSub">이 새소리를 들어보세요</div>
          <div class="audio">
            <button id="leftPlay" aria-label="재생">▶ 재생</button>
            <div class="progress">
              <div class="bar" id="leftBar"></div>
            </div>
          </div>
        </div>
        <div class="vs">VS</div>
        <div class="card" id="rightCard">
          <div id="rightImageContainer" class="image-placeholder">🐦</div>
          <div class="label" id="rightLabel">-</div>
          <div class="sub" id="rightSub">이 새소리를 들어보세요</div>
          <div class="audio">
            <button id="rightPlay" aria-label="재생">▶ 재생</button>
            <div class="progress">
              <div class="bar" id="rightBar"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="select-hint">카드를 탭하여 선택하세요</div>

      <div class="footer desktop-only">
        <div>단축키: <code>L</code>/<code>R</code> 선택, <code>Space</code> 재생/일시정지</div>
      </div>

      <div class="bottom-controls">
        <button id="shuffleBtn" class="btn btn-secondary" title="현재 라운드 참가자 섞기">셔플</button>
        <button id="restartBtn" class="btn btn-secondary" title="처음부터 다시">처음부터</button>
      </div>
    </div>

    <!-- 올림픽 단상 스타일 순위 표시 -->
    <div class="podium" id="podium">
      <div class="podium-title">🏆 새소리 월드컵 결과 🏆</div>
      <div class="fireworks" id="fireworks"></div>
      <div class="podium-container">
        <div class="podium-place first-place" id="firstPlaceElement">
          <div class="podium-image-container">
            <div class="image-placeholder" id="firstPlaceImage">🐦</div>
          </div>
          <div class="podium-base">
            <div class="podium-rank">1등</div>
            <div class="podium-name" id="firstPlaceName">-</div>
          </div>
        </div>
        <div class="podium-place second-place" id="secondPlaceElement">
          <div class="podium-image-container">
            <div class="image-placeholder" id="secondPlaceImage">🐦</div>
          </div>
          <div class="podium-base">
            <div class="podium-rank">2등</div>
            <div class="podium-name" id="secondPlaceName">-</div>
          </div>
        </div>
      </div>
      <button class="podium-restart" id="podiumRestart">다시 도전하기</button>
      <div class="copyright">
        © 2024 TheSoundBunker inc. All rights reserved. | 문의: <a href="mailto:play@soundb.kr">play@soundb.kr</a>
      </div>
    </div>

    <audio id="leftAudio"></audio>
    <audio id="rightAudio"></audio>

    <div class="copyright">
      © 2024 TheSoundBunker inc. All rights reserved. | 문의: <a href="mailto:play@soundb.kr">play@soundb.kr</a>
    </div>
  </div>

  <!-- 풀스크린 이미지 모달 -->
  <div class="image-modal" id="imageModal">
    <img id="modalImage" src="" alt="">
  </div>

  <script>
    // ======== 설정(수정 가능) ========
    const DEFAULT_SOUNDS = [
      { name: "까치", src: "oakvalley/sound/1_까치.mp3", imageUrl: "oakvalley/images/1_까치.jpeg" },
      { name: "오목눈이", src: "oakvalley/sound/2_오목눈이.mp3", imageUrl: "oakvalley/images/2_오목눈이.jpeg" },
      { name: "들꿩", src: "oakvalley/sound/3_들꿩.mp3", imageUrl: "oakvalley/images/3_들꿩.jpeg" },
      { name: "쇠박새", src: "oakvalley/sound/4_쇠박새.mp3", imageUrl: "oakvalley/images/4_쇠박새.jpeg" },
      { name: "상모솔새", src: "oakvalley/sound/5_상모솔새.mp3", imageUrl: "oakvalley/images/5_상모솔새.jpeg" },
      { name: "곤줄박이", src: "oakvalley/sound/6_곤줄박이.mp3", imageUrl: "oakvalley/images/6_곤줄박이.JPG" },
      { name: "노랑할미새", src: "oakvalley/sound/7_노랑할미새.mp3", imageUrl: "oakvalley/images/7_노랑할미새.jpeg" },
      { name: "촉새", src: "oakvalley/sound/8_촉새.mp3", imageUrl: "oakvalley/images/8_촉새.jpeg" },
      { name: "나무발발이", src: "oakvalley/sound/9_나무발발이.mp3", imageUrl: "oakvalley/images/9_나무발발이.jpeg" },
      { name: "까마귀", src: "oakvalley/sound/10_까마귀.mp3", imageUrl: "oakvalley/images/10_까마귀.jpeg" },
      { name: "굴뚝새", src: "oakvalley/sound/11_굴뚝새.mp3", imageUrl: "oakvalley/images/11_굴뚝새.png" },
      { name: "청딱따구리", src: "oakvalley/sound/12_청딱따구리.mp3", imageUrl: "oakvalley/images/12_청딱따구리.jpg" },
    ];

    // ======== DOM 요소 ========
    const leftAudio = document.getElementById('leftAudio');
    const rightAudio = document.getElementById('rightAudio');
    const leftPlay = document.getElementById('leftPlay');
    const rightPlay = document.getElementById('rightPlay');
    const leftBar = document.getElementById('leftBar');
    const rightBar = document.getElementById('rightBar');
    const leftLabel = document.getElementById('leftLabel');
    const rightLabel = document.getElementById('rightLabel');
    const leftCard = document.getElementById('leftCard');
    const rightCard = document.getElementById('rightCard');
    const leftImageContainer = document.getElementById('leftImageContainer');
    const rightImageContainer = document.getElementById('rightImageContainer');
    const matchIndexEl = document.getElementById('matchIndex');
    const matchTotalEl = document.getElementById('matchTotal');
    const remainingEl = document.getElementById('remaining');
    const roundTitle = document.getElementById('roundTitle');
    const stage = document.querySelector('.stage');
    const versus = document.getElementById('versus');
    const podium = document.getElementById('podium');
    const firstPlaceImage = document.getElementById('firstPlaceImage');
    const secondPlaceImage = document.getElementById('secondPlaceImage');
    const firstPlaceName = document.getElementById('firstPlaceName');
    const secondPlaceName = document.getElementById('secondPlaceName');
    const firstPlaceElement = document.getElementById('firstPlaceElement');
    const secondPlaceElement = document.getElementById('secondPlaceElement');
    const fireworksContainer = document.getElementById('fireworks');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const restartBtn = document.getElementById('restartBtn');
    const podiumRestart = document.getElementById('podiumRestart');
    const birdStatus = document.getElementById('birdStatus');

    let choosing = false; // 중복 클릭 방지

    let state = {
      participants: [],
      currentRound: [],
      nextRound: [],
      index: 0,
      left: null,
      right: null,
      roundNumber: 1,
      history: [],
      rankings: [],
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function roundLabel(n, size) {
      if (size === 1) return '🏆 우승자 결정!';
      if (size === 2) return '🔥 결승전';
      if (size === 3) return '🥉 3강전';
      if (size === 4) return '🥈 4강전';
      if (size === 6) return '🎯 6강전';
      if (size === 8) return '⚡ 8강전';
      if (size === 12) return '🎪 12강전';
      if (size === 16) return '🚀 16강전';
      return `🎵 라운드 ${n} (${size}강)`;
    }

    function updateStatus() {
      const totalMatches = Math.ceil(state.currentRound.length / 2);
      const roundName = roundLabel(state.roundNumber, state.currentRound.length);

      roundTitle.textContent = roundName;

      stage.className = 'stage';
      if (state.currentRound.length <= 2) {
        stage.classList.add('final');
      } else if (state.currentRound.length <= 4) {
        stage.classList.add('round-4');
      } else if (state.currentRound.length <= 8) {
        stage.classList.add('round-3');
      } else if (state.currentRound.length <= 16) {
        stage.classList.add('round-2');
      } else {
        stage.classList.add('round-1');
      }

      matchIndexEl.textContent = Math.min(state.index + 1, totalMatches);
      matchTotalEl.textContent = totalMatches;
      remainingEl.textContent = state.currentRound.length;

      updateBirdStatus();
    }

    function updateBirdStatus() {
      const survivingBirds = [
        ...state.currentRound,
        ...state.nextRound,
        ...state.rankings
      ].filter((bird, index, array) =>
        array.findIndex(b => b.name === bird.name) === index
      );

      const fallbackSvg = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMjAiIGZpbGw9IiMzNzQxNTEiLz4KPHN2ZyB4PSIxMCIgeT0iMTAiIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8dGV4dCB4PSIzIiB5PSIxNiIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTYiIGZpbGw9IiM5Y2EzYWYiPvCfkKY8L3RleHQ+Cjwvc3ZnPgo8L3N2Zz4K';

      birdStatus.innerHTML = state.participants.map(bird => {
        let className = 'bird-icon';
        if (!survivingBirds.includes(bird)) {
          className += ' eliminated';
        } else if (state.currentRound.includes(bird) || state.nextRound.includes(bird)) {
          className += ' active';
        }
        if (state.rankings.includes(bird)) {
          className += ' winner';
        }
        const imageUrl = bird.imageUrl || fallbackSvg;
        return `<div class="${className}" title="${bird.name}">
          <img src="${imageUrl}" alt="${bird.name}" onerror="this.src='${fallbackSvg}';">
        </div>`;
      }).join('');
    }

    function stopAllAudio() {
      leftAudio.pause();
      rightAudio.pause();
      leftAudio.currentTime = 0;
      rightAudio.currentTime = 0;
      updatePlayButtons();
    }

    function updatePlayButtons() {
      leftPlay.textContent = leftAudio.paused ? '▶ 재생' : '⏸ 정지';
      leftPlay.classList.toggle('playing', !leftAudio.paused);
      rightPlay.textContent = rightAudio.paused ? '▶ 재생' : '⏸ 정지';
      rightPlay.classList.toggle('playing', !rightAudio.paused);
    }

    function loadMatch() {
      const i = state.index * 2;
      state.left = state.currentRound[i] || null;
      state.right = state.currentRound[i + 1] || null;

      leftCard.classList.remove('winner', 'loser', 'disabled');
      rightCard.classList.remove('winner', 'loser', 'disabled');
      choosing = false;

      if (!state.left && !state.right) {
        advanceRound();
        return;
      }

      if (state.left && !state.right) {
        state.nextRound.push(state.left);
        state.history[state.roundNumber - 1].push({ left: state.left.name, right: null, winner: state.left.name });
        state.index++;
        loadMatch();
        return;
      }

      leftLabel.textContent = state.left?.name ?? '-';
      rightLabel.textContent = state.right?.name ?? '-';

      leftAudio.src = state.left?.src || '';
      rightAudio.src = state.right?.src || '';
      stopAllAudio();
      leftBar.style.width = '0%'; rightBar.style.width = '0%';

      loadBirdImage(state.left, leftImageContainer);
      loadBirdImage(state.right, rightImageContainer);

      updateStatus();
    }

    function loadMatchWithAnimation() {
      versus.classList.add('fade-out');
      setTimeout(() => {
        loadMatch();
        versus.classList.remove('fade-out');
      }, 250);
    }

    function advanceRound() {
      if (state.nextRound.length === 1) {
        const champion = state.nextRound[0];
        const runnerUp = state.currentRound.find(p => p !== champion);
        if (runnerUp) state.rankings.push(runnerUp);
        state.rankings.push(champion);
        showPodium();
        return;
      }
      state.currentRound = [...state.nextRound];
      state.nextRound = [];
      state.index = 0;
      state.roundNumber++;
      state.history.push([]);
      loadMatch();
    }

    function showPodium() {
      stage.style.display = 'none';
      podium.classList.add('show');

      playVictorySound();

      const rankings = state.rankings;
      const secondPlace = rankings[rankings.length - 2];
      const firstPlace = rankings[rankings.length - 1];

      setTimeout(() => {
        if (firstPlace) {
          firstPlaceName.textContent = firstPlace.name;
          loadPodiumImage(firstPlace, firstPlaceImage);
          firstPlaceElement.classList.add('show');
          createFireworks();
        }
      }, 1000);

      setTimeout(() => {
        if (secondPlace) {
          secondPlaceName.textContent = secondPlace.name;
          loadPodiumImage(secondPlace, secondPlaceImage);
          secondPlaceElement.classList.add('show');
        }
        podiumRestart.classList.add('show');
      }, 3000);
    }

    function loadPodiumImage(bird, container) {
      if (bird.imageUrl) {
        container.innerHTML = `<img src="${bird.imageUrl}" alt="${bird.name}" class="podium-image" onerror="this.parentElement.innerHTML='🐦'; this.parentElement.className='image-placeholder';" onclick="openImageModal('${bird.imageUrl}', '${bird.name}')">`;
        container.className = '';
      } else {
        container.innerHTML = '🐦';
        container.className = 'image-placeholder';
      }
    }

    function choose(side) {
      if (!state.left || !state.right || choosing) return;
      choosing = true;
      saveStateSnapshot();

      stopAllAudio();

      const winner = side === 'left' ? state.left : state.right;
      state.nextRound.push(winner);
      state.history[state.roundNumber - 1].push({ left: state.left.name, right: state.right.name, winner: winner.name });

      if (side === 'left') {
        leftCard.classList.add('winner');
        rightCard.classList.add('loser');
      } else {
        rightCard.classList.add('winner');
        leftCard.classList.add('loser');
      }

      updateBirdStatus();

      setTimeout(() => {
        state.index++;
        loadMatchWithAnimation();
      }, 1200);
    }

    function init(participants) {
      const list = shuffle(participants);
      state.participants = list;
      state.currentRound = [...list];
      state.nextRound = [];
      state.index = 0;
      state.roundNumber = 1;
      state.history = [[]];
      state.rankings = [];

      stage.style.display = 'block';
      podium.classList.remove('show');
      firstPlaceElement.classList.remove('show');
      secondPlaceElement.classList.remove('show');
      podiumRestart.classList.remove('show');

      loadMatch();
    }

    // 진행 바 업데이트
    leftAudio.addEventListener('timeupdate', () => {
      if (leftAudio.duration) leftBar.style.width = `${(leftAudio.currentTime / leftAudio.duration) * 100}%`;
    });
    rightAudio.addEventListener('timeupdate', () => {
      if (rightAudio.duration) rightBar.style.width = `${(rightAudio.currentTime / rightAudio.duration) * 100}%`;
    });
    leftAudio.addEventListener('play', updatePlayButtons);
    leftAudio.addEventListener('pause', updatePlayButtons);
    leftAudio.addEventListener('ended', updatePlayButtons);
    rightAudio.addEventListener('play', updatePlayButtons);
    rightAudio.addEventListener('pause', updatePlayButtons);
    rightAudio.addEventListener('ended', updatePlayButtons);

    function toggle(audio, other) {
      if (!audio.src) return;
      if (other && !other.paused) other.pause();
      if (audio.paused) audio.play(); else audio.pause();
    }

    // 재생 버튼 (이벤트 버블링 방지)
    leftPlay.addEventListener('click', (e) => { e.stopPropagation(); toggle(leftAudio, rightAudio); });
    rightPlay.addEventListener('click', (e) => { e.stopPropagation(); toggle(rightAudio, leftAudio); });

    // 카드 전체 클릭으로 선택
    leftCard.addEventListener('click', () => choose('left'));
    rightCard.addEventListener('click', () => choose('right'));

    shuffleBtn.addEventListener('click', () => {
      state.currentRound = shuffle(state.currentRound);
      state.index = 0; state.nextRound = []; state.history[state.roundNumber - 1] = [];
      loadMatch();
    });

    restartBtn.addEventListener('click', () => init(state.participants.length ? state.participants : DEFAULT_SOUNDS));
    podiumRestart.addEventListener('click', () => init(state.participants.length ? state.participants : DEFAULT_SOUNDS));

    // 키보드 단축키
    window.addEventListener('keydown', (e) => {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key.toLowerCase() === 'l') { e.preventDefault(); choose('left'); }
      if (e.key.toLowerCase() === 'r') { e.preventDefault(); choose('right'); }
      if (e.key === ' ') { e.preventDefault();
        if (!rightAudio.paused || (leftAudio.paused && rightAudio.paused)) toggle(leftAudio, rightAudio);
        else toggle(rightAudio, leftAudio);
      }
    });

    // 새 이미지 로드 함수
    function loadBirdImage(bird, container) {
      if (!bird) {
        container.innerHTML = '🐦';
        container.className = 'image-placeholder';
        return;
      }
      if (bird.imageUrl) {
        container.innerHTML = `<img src="${bird.imageUrl}" alt="${bird.name}" class="bird-image" onerror="this.parentElement.innerHTML='🐦'; this.parentElement.className='image-placeholder';" onclick="event.stopPropagation(); openImageModal('${bird.imageUrl}', '${bird.name}')">`;
        container.className = '';
      } else {
        container.innerHTML = '🐦';
        container.className = 'image-placeholder';
      }
    }

    // 승리 효과음
    function createVictorySound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 2.0;
      const sampleRate = audioContext.sampleRate;
      const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < data.length; i++) {
        const t = i / sampleRate;
        let sound = 0;
        if (t < 0.3) {
          const freq = 523 + Math.sin(t * 50) * 100;
          sound += Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 8) * 0.5;
        } else if (t > 0.4 && t < 0.8) {
          const t2 = t - 0.4;
          const freq = 659 + Math.sin(t2 * 60) * 120;
          sound += Math.sin(2 * Math.PI * freq * t2) * Math.exp(-t2 * 6) * 0.6;
        }
        if (t > 0.8) {
          const t3 = t - 0.8;
          sound += sound * 0.1 * Math.exp(-t3 * 3);
        }
        data[i] = Math.max(-1, Math.min(1, sound));
      }
      return buffer;
    }

    function playVictorySound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = createVictorySound();
        const source = audioContext.createBufferSource();
        const gainNode = audioContext.createGain();
        source.buffer = buffer;
        gainNode.gain.value = 0.3;
        source.connect(gainNode);
        gainNode.connect(audioContext.destination);
        source.start();
      } catch (error) {
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
      }
    }

    // 폭죽 효과
    function createFireworks() {
      const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const firework = document.createElement('div');
          firework.className = 'firework';
          firework.style.left = Math.random() * 100 + '%';
          firework.style.top = Math.random() * 100 + '%';
          firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          fireworksContainer.appendChild(firework);
          setTimeout(() => firework.remove(), 1500);

          for (let j = 0; j < 8; j++) {
            setTimeout(() => {
              const sparkle = document.createElement('div');
              sparkle.className = 'sparkle';
              sparkle.style.left = firework.style.left;
              sparkle.style.top = firework.style.top;
              sparkle.style.animationDelay = Math.random() * 0.5 + 's';
              fireworksContainer.appendChild(sparkle);
              setTimeout(() => sparkle.remove(), 800);
            }, j * 100);
          }
        }, i * 200);
      }
    }

    // 이미지 모달
    function openImageModal(imageUrl, birdName) {
      const modal = document.getElementById('imageModal');
      const modalImage = document.getElementById('modalImage');
      modalImage.src = imageUrl;
      modalImage.alt = birdName;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeImageModal() {
      document.getElementById('imageModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.getElementById('imageModal').addEventListener('click', closeImageModal);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeImageModal();
    });

    // 뒤로가기 처리 - 선택 되돌리기 (undo)
    const stateSnapshots = [];

    function saveStateSnapshot() {
      stateSnapshots.push(JSON.stringify({
        currentRound: state.currentRound.map(b => b.name),
        nextRound: state.nextRound.map(b => b.name),
        index: state.index,
        roundNumber: state.roundNumber,
        history: state.history,
        rankings: state.rankings.map(b => b.name),
      }));
      history.pushState({ gameStep: stateSnapshots.length }, '');
    }

    function restoreStateSnapshot() {
      if (stateSnapshots.length === 0) return false;
      const snapshot = JSON.parse(stateSnapshots.pop());
      const findBird = name => state.participants.find(b => b.name === name);

      state.currentRound = snapshot.currentRound.map(findBird);
      state.nextRound = snapshot.nextRound.map(findBird);
      state.index = snapshot.index;
      state.roundNumber = snapshot.roundNumber;
      state.history = snapshot.history;
      state.rankings = snapshot.rankings.map(findBird);

      if (podium.classList.contains('show')) {
        podium.classList.remove('show');
        firstPlaceElement.classList.remove('show');
        secondPlaceElement.classList.remove('show');
        podiumRestart.classList.remove('show');
        stage.style.display = 'block';
      }

      stopAllAudio();
      loadMatch();
      return true;
    }

    window.addEventListener('popstate', function(e) {
      if (e.state && e.state.gameStep) {
        restoreStateSnapshot();
      } else {
        if (stateSnapshots.length === 0 && (state.index > 0 || state.roundNumber > 1)) {
          const leave = confirm('새소리 월드컵을 나가시겠습니까?\n진행 중인 게임이 초기화됩니다.');
          if (leave) {
            window.removeEventListener('popstate', arguments.callee);
            history.back();
          } else {
            history.pushState({ gameStep: 0 }, '');
          }
        }
      }
    });

    history.replaceState({ gameStep: 0 }, '');
    init(DEFAULT_SOUNDS);
  </script>
